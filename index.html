<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Tool</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 20px;
      background-color: #f4f4f9;
    }
    #chat-box {
      height: 400px;
      border: 1px solid #ccc;
      background: #fff;
      overflow-y: auto;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .message {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 80%;
      word-break: break-word;
    }
    .user {
      background-color: #007bff;
      color: white;
      margin-left: auto;
    }
    .ai {
      background-color: #e9ecef;
      color: #333;
      margin-right: auto;
    }
    .input-area {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled {
      background-color: #aaa;
    }
  </style>
</head>
<body>

  <h2>AI チャット</h2>
  <div id="chat-box"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()">送信</button>
  </div>

  <script>
    const API_KEY = 'AQ.Ab8RN6JasoIeTjKtGh3RaOGPyI1NZ2ar1w8vUTiXPoVOKC89rQ';
    const conversationHistory = [];

    async function sendMessage() {
      const inputEl = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const text = inputEl.value.trim();

      if (!text) return;

      appendMessage(text, 'user');
      inputEl.value = '';
      
      inputEl.disabled = true;
      sendBtn.disabled = true;

      conversationHistory.push({
        role: 'user',
        parts: [{ text: text }]
      });

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: conversationHistory })
        });

        const data = await response.json();

        if (data.error) {
          appendMessage(`エラー: ${data.error.message}`, 'ai');
        } else {
          const aiMessage = data.candidates[0].content.parts[0].text;
          appendMessage(aiMessage, 'ai');

          conversationHistory.push({
            role: 'model',
            parts: [{ text: aiMessage }]
          });
        }
      } catch (err) {
        appendMessage('通信エラーが発生しました。', 'ai');
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function appendMessage(text, sender) {
      const chatBox = document.getElementById('chat-box');
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);
      msgDiv.textContent = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
