const [topP, setTopP] = React.useState(0.95);
const [thinkingLevel, setThinkingLevel] = React.useState("HIGH");
const [enableGoogleSearch, setEnableGoogleSearch] = React.useState(false);

const [attachments, setAttachments] = React.useState([]);

const fileInputRef = React.useRef(null);

loadSessions();
}, []);

const loadSessions = async () => {
try {
const { data, error } = await supabaseClient.from("conversations").select("*").order("updated_at", { ascending: false });
if (!error && data && data.length > 0) {
const cloudSessions = data.map(item => ({
id: item.id,
title: item.title,
model: item.model || "gemini-3.6-flash",
messages: item.messages || [],
createdAt: item.created_at || new Date().toISOString(),
updatedAt: item.updated_at || new Date().toISOString()
}));
setSessions(cloudSessions);
setActiveSessionId(cloudSessions[0].id);
setIsCloudSynced(true);
return;
}
} catch(e) {}

const local = localStorage.getItem("gemini_rainbow_nexus_sessions");
if (local) {
try {
const parsed = JSON.parse(local);
if (parsed.length > 0) {
setSessions(parsed);
setActiveSessionId(parsed[0].id);
return;
}
} catch(e) {}
}

createNewSession();
};

const saveSessions = async (updated) => {
setSessions(updated);
localStorage.setItem("gemini_rainbow_nexus_sessions", JSON.stringify(updated));

const cur = updated.find(s => s.id === activeSessionId);
if (cur) {
try {
const { error } = await supabaseClient.from("conversations").upsert({
id: cur.id,
title: cur.title,
model: cur.model,
messages: cur.messages,
updated_at: new Date().toISOString()
});
if (!error) setIsCloudSynced(true);
} catch(e) {
setIsCloudSynced(false);
}
}
};

const createNewSession = () => {
const newSession = {
id: "session_" + Date.now().toString(36),
title: "新しい対話",
model: activeModel.id,
messages: [],
createdAt: new Date().toISOString(),
updatedAt: new Date().toISOString()
};
const updated = [newSession, ...sessions];
setActiveSessionId(newSession.id);
saveSessions(updated);
};

const currentSession = sessions.find(s => s.id === activeSessionId) || {
id: activeSessionId || "default",
title: "新しい対話",
model: activeModel.id,
messages: []
};

React.useEffect(() => {
messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
}, [currentSession.messages, isLoading]);

const handleSendMessage = async (textToSend, attsToSend) => {
const text = textToSend !== undefined ? textToSend : inputText;
const atts = attsToSend !== undefined ? attsToSend : attachments;

if ((!text.trim() && atts.length === 0) || isLoading) return;

const userMsg = {
id: "msg_u_" + Date.now(),
sender: "user",
text: text,
timestamp: new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }),
attachments: atts.length > 0 ? atts : undefined
};

const modelMsg = {
id: "msg_m_" + Date.now(),
sender: "model",
text: "",
timestamp: new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }),
isStreaming: true,
modelUsed: activeModel.name
};

const newTitle = currentSession.messages.length === 0 && text.trim()
? text.trim().slice(0, 24)
: currentSession.title;

const updatedMessages = [...currentSession.messages, userMsg, modelMsg];

const updatedSessions = sessions.map(s => {
if (s.id === currentSession.id) {
return {
...s,
title: newTitle,
messages: updatedMessages,
updatedAt: new Date().toISOString()
};
}
return s;
});

setSessions(updatedSessions);
setInputText("");
setAttachments([]);
setIsLoading(true);

try {
const apiContents = [];
currentSession.messages.forEach(m => {
if (m.text) {
apiContents.push({
role: m.sender === "user" ? "user" : "model",
parts: [{ text: m.text }]
});
}
});

const userParts = [];
if (text.trim()) userParts.push({ text: text });

atts.forEach(att => {
const b64 = att.dataUrl.split(",")[1];
if (b64) {
userParts.push({
inlineData: { mimeType: att.mimeType, data: b64 }
});
}
});

apiContents.push({ role: "user", parts: userParts });

const response = await fetch("/api/chat/stream", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
model: activeModel.id,
contents: apiContents,
systemInstruction,
temperature,
topP,
thinkingLevel,
enableGoogleSearch
})
});

if (!response.body) throw new Error("Stream fail");

const reader = response.body.getReader();
const decoder = new TextDecoder();
let accText = "";
let grounding = [];

while (true) {
const { done, value } = await reader.read();
if (done) break;

const chunk = decoder.decode(value, { stream: true });
const lines = chunk.split("\n");

for (const line of lines) {
if (line.startsWith("data: ")) {
const dataStr = line.replace("data: ", "").trim();
if (dataStr === "[DONE]") continue;

try {
const parsed = JSON.parse(dataStr);
if (parsed.text) accText += parsed.text;
if (parsed.groundingChunks) grounding = parsed.groundingChunks;

setSessions(prev => prev.map(s => {
if (s.id === currentSession.id) {
const msgs = [...s.messages];
const last = msgs[msgs.length - 1];
if (last && last.sender === "model") {
last.text = accText;
last.groundingSources = grounding.length > 0 ? grounding : undefined;
}
return { ...s, messages: msgs };
}
return s;
}));
} catch(e) {}
}
}
}

setSessions(prev => prev.map(s => {
if (s.id === currentSession.id) {
const msgs = [...s.messages];
const last = msgs[msgs.length - 1];
if (last && last.sender === "model") last.isStreaming = false;
return { ...s, messages: msgs };
}
return s;
}));

saveSessions(sessions);
} catch(e) {
setSessions(prev => prev.map(s => {
if (s.id === currentSession.id) {
const msgs = [...s.messages];
const last = msgs[msgs.length - 1];
if (last && last.sender === "model") {
last.text = "応答生成に失敗しました。パラメーターまたはキーをご確認ください。";
last.isStreaming = false;
}
return { ...s, messages: msgs };
}
return s;
}));
} finally {
setIsLoading(false);
}
};

const handleFileUpload = (e) => {
if (!e.target.files) return;
const files = Array.from(e.target.files);
files.forEach(file => {
const reader = new FileReader();
reader.onload = (event) => {
setAttachments(prev => [
...prev,
{
id: Math.random().toString(36).substring(2, 9),
name: file.name,
mimeType: file.type || "application/octet-stream",
dataUrl: event.target.result
}
]);
};
reader.readAsDataURL(file);
});
};

prompt: imgPrompt,
model: "gemini-3.1-flash-image",

if (data.imageUrl) {
setGeneratedImgUrl(data.imageUrl);
} else {

} catch(e) {
alert("画像生成リクエストエラー");
} finally {
setImgGenerating(false);
}
};

const uMsg = {

sender: "user",
text: `画像生成リクエスト: ${imgPrompt}`,

const updated = [...currentSession.messages, uMsg, mMsg];
const updatedSessions = sessions.map(s => s.id === currentSession.id ? { ...s, messages: updated } : s);
saveSessions(updatedSessions);
setIsImageGenOpen(false);
};

return (

<div className="p-4 border-b border-slate-200/80 flex items-center justify-between bg-white/50">

<div className="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 via-red-500 to-yellow-400 p-[1.5px]">
<div className="w-full h-full bg-white rounded-[6px] flex items-center justify-center font-bold text-blue-600 font-outfit text-xs">
G

<span className="truncate">{s.title || "無題の対話"}</span>

</div>

<div className="font-bold text-slate-800">{tpl.title}</div>

<main className="flex-1 overflow-y-auto min-h-0 relative">
{currentSession.messages.length === 0 ? (
<div className="max-w-4xl mx-auto px-4 py-16 flex flex-col items-center justify-center min-h-[70vh] text-center space-y-6">
<div className="w-16 h-16 rounded-2xl rainbow-border rainbow-glow flex items-center justify-center bg-white shadow-xl animate-pulse-subtle">
<span className="text-2xl text-blue-600">✦</span>
</div>
<div className="space-y-2">
<h1 className="text-3xl font-extrabold text-slate-900 font-outfit">
<span className="rainbow-text">Gemini Rainbow</span> Nexus 3.6
</h1>
<p className="text-slate-600 text-xs max-w-md mx-auto leading-relaxed">
Google Gemini の全AIモデルを搭載した近未来ワークスペース。思考推論、高精細画像生成、Google 検索連動に対応。
</p>
</div>

<div className="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full max-w-2xl text-left pt-2">
<div onClick={() => handleSendMessage("React 19とTailwind CSSを使ったUIコンポーネントを作成してください。", [])} className="p-3.5 rounded-2xl glass-card hover:border-blue-300 cursor-pointer space-y-1 transition-all">
<div className="font-bold text-xs text-slate-900">💻 高度プログラミング</div>
<div className="text-[11px] text-slate-500">React 19 / TypeScript 設計</div>
</div>
<div onClick={() => setIsImageGenOpen(true)} className="p-3.5 rounded-2xl glass-card hover:border-purple-300 cursor-pointer space-y-1 transition-all">
<div className="font-bold text-xs text-slate-900">🎨 画像生成スタジオ</div>
<div className="text-[11px] text-slate-500">1K-4K 高画質アート創出</div>
</div>
<div onClick={() => { setEnableGoogleSearch(true); handleSendMessage("最新のAIトレンドをGoogle検索してまとめてください。", []); }} className="p-3.5 rounded-2xl glass-card hover:border-emerald-300 cursor-pointer space-y-1 transition-all">
<div className="font-bold text-xs text-slate-900">🌐 Web検索 Grounding</div>
<div className="text-[11px] text-slate-500">リアルタイム情報補完</div>
</div>
</div>
</div>
) : (
<div className="divide-y divide-slate-100 pb-12">
{currentSession.messages.map(m => (
<div key={m.id} className={`py-5 px-4 sm:px-6 ${m.sender === "model" ? "bg-slate-50/60" : "bg-white"}`}>
<div className="max-w-4xl mx-auto flex gap-4">
<div className="w-8 h-8 rounded-xl shrink-0 flex items-center justify-center font-bold text-xs bg-white border shadow-2xs">
{m.sender === "model" ? "✦" : "👤"}
</div>
<div className="flex-1 space-y-2 min-w-0">
<div className="flex items-center gap-2 text-xs">
<span className="font-bold text-slate-800 font-outfit">{m.sender === "model" ? "Gemini AI" : "あなた"}</span>
<span className="text-[10px] text-slate-400">{m.timestamp}</span>
</div>

{m.attachments && (
<div className="flex flex-wrap gap-2">
{m.attachments.map((att, i) => (
<img key={i} src={att.dataUrl} className="w-16 h-16 object-cover rounded-lg border" />
))}
</div>
)}

{m.text && (
<div className="text-sm leading-relaxed text-slate-800 whitespace-pre-wrap font-normal" dangerouslySetInnerHTML={{ __html: window.marked.parse(m.text) }} />
)}

{m.generatedImageUrl && (
<img src={m.generatedImageUrl} className="max-w-md w-full rounded-xl border shadow-sm" />
)}

{m.groundingSources && (
<div className="pt-2 text-[11px] text-emerald-700 font-medium">
検索情報源: {m.groundingSources.map((g, i) => g.web ? <a key={i} href={g.web.uri} target="_blank" className="underline mr-2">{g.web.title || g.web.uri}</a> : null)}
</div>
)}

{m.isStreaming && (
<div className="text-xs text-blue-600 font-medium animate-pulse">✦ 回答を生成中...</div>
)}
</div>
</div>
</div>
))}
<div ref={messagesEndRef} />
</div>
)}
</main>

<div className="sticky bottom-0 p-3 sm:p-4 bg-gradient-to-t from-white via-white/95 to-transparent backdrop-blur-md">
<div className="max-w-4xl mx-auto space-y-2">
{attachments.length > 0 && (
<div className="flex gap-2 p-2 bg-slate-50 border rounded-xl">
{attachments.map(att => (
<div key={att.id} className="relative text-xs bg-white border p-1 rounded flex items-center gap-1">
<span>{att.name}</span>
<button onClick={() => setAttachments(prev => prev.filter(x => x.id !== att.id))} className="text-red-500 p-0.5">✕</button>
</div>
))}
</div>
)}

<div className="relative rainbow-border bg-white shadow-lg">
<textarea
value={inputText}
onChange={(e) => setInputText(e.target.value)}
onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSendMessage(); } }}
placeholder={`${activeModel.name} にメッセージを入力... (Shift+Enterで改行)`}
rows={2}
className="w-full p-3.5 pr-24 text-sm text-slate-800 bg-transparent focus:outline-none resize-none"
/>
<div className="absolute right-2.5 bottom-2.5 flex items-center gap-1.5">
<input type="file" ref={fileInputRef} onChange={handleFileUpload} multiple className="hidden" />
<button onClick={() => fileInputRef.current?.click()} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-xl">📎</button>
<button onClick={() => handleSendMessage()} disabled={isLoading} className="p-2.5 rounded-xl bg-gradient-to-r from-blue-600 via-indigo-600 to-emerald-500 text-white font-bold cursor-pointer shadow-md">➤</button>
</div>
</div>
</div>
</div>
</div>

{isModelModalOpen && (
<div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
<div className="bg-white rounded-2xl w-full max-w-xl p-5 border shadow-2xl space-y-4">
<div className="flex justify-between items-center border-b pb-3">
<h3 className="font-bold text-slate-900 text-sm font-outfit">Gemini 全AIモデル選択</h3>
<button onClick={() => setIsModelModalOpen(false)}>✕</button>
</div>
<div className="space-y-2 max-h-[60vh] overflow-y-auto">
{ALL_MODELS.map(m => (
<div
key={m.id}
onClick={() => { setActiveModel(m); setIsModelModalOpen(false); }}
className={`p-3 rounded-xl border cursor-pointer transition-all flex items-start justify-between ${m.id === activeModel.id ? "bg-blue-50 border-blue-400" : "bg-white border-slate-200 hover:bg-slate-50"}`}
>
<div>
<div className="font-bold text-xs text-slate-900 font-outfit">{m.name} <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">{m.badge}</span></div>
<div className="text-[11px] text-slate-500 mt-1">{m.description}</div>
</div>
</div>
))}
</div>
</div>
</div>
)}

{isImageGenOpen && (
<div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
<div className="bg-white rounded-2xl w-full max-w-2xl p-5 border shadow-2xl space-y-4">
<div className="flex justify-between items-center border-b pb-3">
<h3 className="font-bold text-slate-900 text-sm font-outfit">Gemini 3.1 ビジュアルAI画像生成</h3>
<button onClick={() => setIsImageGenOpen(false)}>✕</button>
</div>
<textarea
value={imgPrompt}
onChange={(e) => setImgPrompt(e.target.value)}
placeholder="プロンプトを入力（例: ネオ東京の夜景、ホログラフィック・レインボー...）"
rows={3}
className="w-full p-3 bg-slate-50 border rounded-xl text-xs text-slate-800"
/>
<div className="flex justify-between items-center">
<select value={imgAspect} onChange={(e) => setImgAspect(e.target.value)} className="p-2 border rounded-lg text-xs bg-white">
<option value="1:1">1:1 (正方形)</option>
<option value="16:9">16:9 (横長)</option>
<option value="9:16">9:16 (縦長)</option>
</select>
<button onClick={handleGenerateImage} disabled={imgGenerating} className="px-4 py-2 bg-purple-600 text-white rounded-xl text-xs font-bold shadow cursor-pointer">
{imgGenerating ? "生成中..." : "高精細生成"}
</button>
</div>
{generatedImgUrl && (
<div className="space-y-2 pt-2">
<img src={generatedImgUrl} className="max-h-60 mx-auto rounded-xl border" />
<button onClick={insertGeneratedImage} className="w-full py-2 bg-blue-600 text-white rounded-xl text-xs font-bold">チャットに挿入</button>
</div>
)}
</div>
</div>
)}

{isConfigDrawerOpen && (
<div className="fixed inset-0 z-50 bg-slate-900/30 backdrop-blur-xs flex justify-end">
<div className="w-full max-w-sm bg-white h-full p-5 shadow-2xl space-y-5 overflow-y-auto">
<div className="flex justify-between items-center border-b pb-3">
<h3 className="font-bold text-slate-900 text-sm font-outfit">システム設定 & パラメーター</h3>
<button onClick={() => setIsConfigDrawerOpen(false)}>✕</button>
</div>
<div className="space-y-2 text-xs">
<label className="font-bold text-slate-800 block">システムプロンプト (Role)</label>
<textarea value={systemInstruction} onChange={(e) => setSystemInstruction(e.target.value)} rows={4} className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" />
</div>
<div className="space-y-2 text-xs">
<label className="font-bold text-slate-800 block">Temperature: {temperature}</label>
<input type="range" min="0" max="2" step="0.1" value={temperature} onChange={(e) => setTemperature(parseFloat(e.target.value))} className="w-full accent-blue-600" />
</div>
<div className="space-y-2 text-xs">
<label className="font-bold text-slate-800 block">思考レベル (Thinking Level)</label>
<div className="grid grid-cols-3 gap-2">
{["HIGH", "LOW", "MINIMAL"].map(lvl => (
<button key={lvl} onClick={() => setThinkingLevel(lvl)} className={`p-2 rounded-lg text-[11px] font-bold border ${thinkingLevel === lvl ? "bg-indigo-50 text-indigo-700 border-indigo-300" : "bg-white text-slate-600"}`}>{lvl}</button>
))}
</div>
</div>
</div>
</div>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
