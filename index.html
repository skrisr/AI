<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini AI Studio</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- React 18 & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN (Browser JSX Transpiler) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Marked.js (Markdown Engine) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .font-display {
      font-family: 'Outfit', sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.4);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(107, 114, 128, 0.7);
    }
    .markdown-body p {
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }
    .markdown-body p:last-child {
      margin-bottom: 0;
    }
    .markdown-body code {
      background-color: rgba(125, 125, 125, 0.15);
      padding: 0.2rem 0.4rem;
      border-radius: 0.375rem;
      font-size: 0.85em;
    }
    .markdown-body pre {
      background-color: #1e293b;
      color: #f8fafc;
      padding: 1rem;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
    }
  </style>
</head>
<body class="h-full bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200 selection:bg-blue-500 selection:text-white">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- インライン SVG アイコン集 ---
    const Icons = {
      GeminiLogo: ({ className = "w-6 h-6" }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 0C12 6.62742 6.62742 12 0 12C6.62742 12 12 17.3726 12 24C12 17.3726 17.3726 12 24 12C17.3726 12 12 6.62742 12 0Z"
            fill="url(#gemini_grad)"
          />
          <defs>
            <linearGradient id="gemini_grad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stopColor="#1a73e8" />
              <stop offset="30%" stopColor="#d93025" />
              <stop offset="65%" stopColor="#f9ab00" />
              <stop offset="100%" stopColor="#1e8e3e" />
            </linearGradient>
          </defs>
        </svg>
      ),
      PanelLeft: ({ className = "w-5 h-5" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
      ),
      PenSquare: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      ),
      Sparkles: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
      ),
      Search: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      ),
      Image: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      ),
      LayoutGrid: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
      ),
      Plus: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      ),
      FileText: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      ),
      Trash2: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
      ),
      User: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      ),
      Settings: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      ),
      Sun: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      ),
      Moon: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      ),
      ChevronDown: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      ),
      Send: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      ),
      Globe: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      ),
      X: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      ),
      Check: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      ),
      Edit2: ({ className = "w-3 h-3" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
      ),
      Volume2: ({ className = "w-4 h-4" }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      )
    };

    const MODELS = [
      { id: "gemini-3.6-flash", name: "Gemini 3.6 Flash", badge: "標準", desc: "高速でバランスに優れた最新標準モデル" },
      { id: "gemini-3.1-pro-preview", name: "Gemini 3.1 Pro Preview", badge: "高度推論", desc: "複雑な思考と高度な分析・コーディングに対応" },
      { id: "gemini-3.1-flash-lite", name: "Gemini 3.1 Flash-Lite", badge: "爆速", desc: "最高速のレスポンス" },
      { id: "gemini-thinking", name: "Gemini 思考モード", badge: "Deep Thinking", desc: "多角的な論理プロセスを表示" }
    ];

    function App() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [themeMode, setThemeMode] = useState(() => localStorage.getItem("gemini_theme") || "light");
      const [userName, setUserName] = useState(() => localStorage.getItem("gemini_user_name") || "sr");
      const [isEditingName, setIsEditingName] = useState(false);
      const [inputName, setInputName] = useState(userName);

      const [activeModel, setActiveModel] = useState(MODELS[0]);
      const [isModelDropdownOpen, setIsModelDropdownOpen] = useState(false);
      const [enableGoogleSearch, setEnableGoogleSearch] = useState(false);

      const [notebooks, setNotebooks] = useState(() => {
        try {
          const saved = localStorage.getItem("gemini_notebooks");
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      const [sessions, setSessions] = useState(() => {
        try {
          const saved = localStorage.getItem("gemini_sessions");
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      const [activeSessionId, setActiveSessionId] = useState(() => {
        return sessions.length > 0 ? sessions[0].id : "";
      });

      const [inputText, setInputText] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [attachments, setAttachments] = useState([]);
      const [isConfigOpen, setIsConfigOpen] = useState(false);
      const [systemInstruction, setSystemInstruction] = useState("");
      const [temperature, setTemperature] = useState(0.7);

      const fileInputRef = useRef(null);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        if (themeMode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        localStorage.setItem("gemini_theme", themeMode);
      }, [themeMode]);

      useEffect(() => {
        localStorage.setItem("gemini_sessions", JSON.stringify(sessions));
      }, [sessions]);

      useEffect(() => {
        localStorage.setItem("gemini_notebooks", JSON.stringify(notebooks));
      }, [notebooks]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [sessions, isLoading]);

      const handleSaveName = () => {
        const trimmed = inputName.trim() || "sr";
        setUserName(trimmed);
        localStorage.setItem("gemini_user_name", trimmed);
        setIsEditingName(false);
      };

      const handleNewChat = () => {
        const newId = "session_" + Date.now();
        const newSession = {
          id: newId,
          title: "新しいチャット",
          messages: [],
          createdAt: new Date().toISOString()
        };
        setSessions((prev) => [newSession, ...prev]);
        setActiveSessionId(newId);
        setInputText("");
        setAttachments([]);
      };

      const currentSession = sessions.find((s) => s.id === activeSessionId) || { messages: [] };

      const handleCreateNotebook = () => {
        const name = prompt("新規ノートブックのタイトルを入力してください:");
        if (name && name.trim()) {
          setNotebooks((prev) => [...prev, name.trim()]);
        }
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files || []);
        files.forEach((file) => {
          const reader = new FileReader();
          reader.onload = () => {
            setAttachments((prev) => [
              ...prev,
              {
                name: file.name,
                type: file.type,
                data: reader.result
              }
            ]);
          };
          reader.readAsDataURL(file);
        });
      };

      // ★ リアル Gemini API ストリーミング接続 ★
      const handleSendMessage = async (e) => {
        if (e) e.preventDefault();
        if ((!inputText.trim() && attachments.length === 0) || isLoading) return;

        let targetId = activeSessionId;
        let currentSessions = [...sessions];

        if (!targetId || !currentSessions.find((s) => s.id === targetId)) {
          targetId = "session_" + Date.now();
          const newSess = {
            id: targetId,
            title: inputText.trim().substring(0, 24) || "画像付きプロンプト",
            messages: [],
            createdAt: new Date().toISOString()
          };
          currentSessions = [newSess, ...currentSessions];
          setActiveSessionId(targetId);
        }

        const userMsg = {
          id: "msg_" + Date.now(),
          role: "user",
          text: inputText.trim(),
          attachments: [...attachments],
          timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        };

        const targetSess = currentSessions.find((s) => s.id === targetId);
        if (targetSess) {
          if (targetSess.messages.length === 0 && inputText.trim()) {
            targetSess.title = inputText.trim().substring(0, 24);
          }
          targetSess.messages.push(userMsg);
        }

        setSessions(currentSessions);
        setInputText("");
        setAttachments([]);
        setIsLoading(true);

        try {
          const apiContents = targetSess.messages.map((m) => {
            const parts = [];
            if (m.text) parts.push({ text: m.text });
            if (m.attachments) {
              m.attachments.forEach((att) => {
                if (att.data && att.data.includes(";base64,")) {
                  const [meta, base64Data] = att.data.split(";base64,");
                  const mimeType = meta.replace("data:", "");
                  parts.push({
                    inlineData: { mimeType, data: base64Data }
                  });
                }
              });
            }
            return {
              role: m.role === "user" ? "user" : "model",
              parts: parts.length > 0 ? parts : [{ text: " " }]
            };
          });

          const res = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: activeModel.id,
              contents: apiContents,
              systemInstruction,
              temperature,
              enableGoogleSearch
            })
          });

          if (!res.ok) {
            throw new Error(`API error: ${res.status}`);
          }

          const assistantMsgId = "msg_" + (Date.now() + 1);
          const initialAssistantMsg = {
            id: assistantMsgId,
            role: "assistant",
            text: "",
            timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
          };

          setSessions((prev) =>
            prev.map((s) => (s.id === targetId ? { ...s, messages: [...s.messages, initialAssistantMsg] } : s))
          );

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let accumulatedText = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split("\n");

            for (const line of lines) {
              if (line.startsWith("data: ")) {
                const dataStr = line.replace("data: ", "").trim();
                if (dataStr === "[DONE]") break;
                try {
                  const parsed = JSON.parse(dataStr);
                  if (parsed.text) {
                    accumulatedText += parsed.text;
                    setSessions((prev) =>
                      prev.map((s) => {
                        if (s.id === targetId) {
                          const updatedMsgs = s.messages.map((m) =>
                            m.id === assistantMsgId ? { ...m, text: accumulatedText } : m
                          );
                          return { ...s, messages: updatedMsgs };
                        }
                        return s;
                      })
                    );
                  }
                } catch (err) {}
              }
            }
          }
        } catch (err) {
          console.error("Gemini API Error:", err);
          const errorMsg = {
            id: "msg_" + (Date.now() + 1),
            role: "assistant",
            text: `⚠️ Gemini API 通信エラー: ${err.message}`,
            timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
          };

          setSessions((prev) =>
            prev.map((s) => (s.id === targetId ? { ...s, messages: [...s.messages, errorMsg] } : s))
          );
        } finally {
          setIsLoading(false);
        }
      };

      const handleDeleteSession = (id, e) => {
        if (e) e.stopPropagation();
        setSessions((prev) => prev.filter((s) => s.id !== id));
        if (activeSessionId === id) {
          setActiveSessionId("");
        }
      };

      const handleSpeechText = async (text) => {
        try {
          const res = await fetch("/api/generate-speech", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
          });
          const data = await res.json();
          if (data.audioBase64) {
            const audio = new Audio("data:audio/mp3;base64," + data.audioBase64);
            audio.play();
          } else {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "ja-JP";
            window.speechSynthesis.speak(utterance);
          }
        } catch {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "ja-JP";
          window.speechSynthesis.speak(utterance);
        }
      };

      return (
        <div className="flex h-screen overflow-hidden bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">
          
          <aside className={`fixed lg:static top-0 left-0 bottom-0 z-40 w-72 bg-[#f0f4f9] dark:bg-slate-900 border-r border-slate-200/80 dark:border-slate-800 flex flex-col transition-transform duration-200 ${sidebarOpen ? "translate-x-0" : "-translate-x-full lg:translate-x-0"}`}>
            
            <div className="p-4 flex items-center justify-between">
              <div className="flex items-center gap-2.5 cursor-pointer" onClick={handleNewChat}>
                <Icons.GeminiLogo className="w-5 h-5" />
                <span className="font-extrabold text-lg tracking-tight font-display">Gemini</span>
              </div>
              <button onClick={() => setSidebarOpen(false)} className="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg lg:hidden">
                <Icons.X className="w-5 h-5 text-slate-500" />
              </button>
            </div>

            <div className="px-3 space-y-1">
              <button onClick={handleNewChat} className="w-full py-2.5 px-3.5 rounded-full bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 font-bold text-xs flex items-center gap-3 border border-slate-200/80 dark:border-slate-700 shadow-2xs text-slate-800 dark:text-slate-100 cursor-pointer">
                <Icons.PenSquare className="w-4 h-4 text-slate-600 dark:text-slate-300" />
                <span>チャットを新規作成</span>
              </button>

              <button className="w-full py-2 px-3.5 rounded-full hover:bg-slate-200/60 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium text-xs flex items-center gap-3 cursor-pointer">
                <Icons.Search className="w-4 h-4 text-slate-500" />
                <span>チャットを検索</span>
              </button>

              <button className="w-full py-2 px-3.5 rounded-full hover:bg-slate-200/60 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium text-xs flex items-center gap-3 cursor-pointer">
                <Icons.Image className="w-4 h-4 text-slate-500" />
                <span>画像</span>
              </button>

              <button onClick={() => setIsConfigOpen(true)} className="w-full py-2 px-3.5 rounded-full hover:bg-slate-200/60 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium text-xs flex items-center gap-3 cursor-pointer">
                <Icons.LayoutGrid className="w-4 h-4 text-slate-500" />
                <span>ライブラリ</span>
              </button>
            </div>

            <div className="my-3 border-t border-slate-200/60 dark:border-slate-800" />

            <div className="flex-1 overflow-y-auto px-3 space-y-4">
              <div className="space-y-1">
                <div className="px-3 text-[11px] font-semibold text-slate-500 dark:text-slate-400">ノートブック</div>
                <button onClick={handleCreateNotebook} className="w-full py-1.5 px-3 rounded-xl hover:bg-slate-200/60 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-medium flex items-center gap-2 cursor-pointer">
                  <Icons.Plus className="w-3.5 h-3.5 text-slate-400" />
                  <span>ノートブックを新規作成</span>
                </button>
                {notebooks.map((nb, i) => (
                  <div key={i} className="py-1.5 px-3 rounded-xl hover:bg-slate-200/60 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs flex items-center gap-2 cursor-pointer">
                    <Icons.FileText className="w-3.5 h-3.5 text-slate-400 shrink-0" />
                    <span className="truncate">{nb}</span>
                  </div>
                ))}
              </div>

              <div className="space-y-1">
                <div className="px-3 text-[11px] font-semibold text-slate-500 dark:text-slate-400">最近</div>
                {sessions.length === 0 ? (
                  <div className="px-3 py-1 text-xs text-slate-400 italic">チャット履歴はありません</div>
                ) : (
                  sessions.map((s) => (
                    <div
                      key={s.id}
                      onClick={() => setActiveSessionId(s.id)}
                      className={`group flex items-center justify-between py-2 px-3.5 rounded-full text-xs cursor-pointer ${
                        s.id === activeSessionId ? "bg-slate-200/90 dark:bg-slate-800 font-bold" : "hover:bg-slate-200/50 dark:hover:bg-slate-800/60 text-slate-700 dark:text-slate-300"
                      }`}
                    >
                      <span className="truncate flex-1 mr-1">{s.title || "新しいチャット"}</span>
                      <button onClick={(e) => handleDeleteSession(s.id, e)} className="p-1 opacity-0 group-hover:opacity-100 hover:text-red-500 transition-opacity">
                        <Icons.Trash2 className="w-3.5 h-3.5 text-slate-400" />
                      </button>
                    </div>
                  ))
                )}
              </div>
            </div>

            <div className="p-3 border-t border-slate-200/60 dark:border-slate-800 flex items-center justify-between bg-[#f0f4f9] dark:bg-slate-900">
              <div className="flex items-center gap-2 flex-1 min-w-0 mr-1">
                <div className="w-7 h-7 rounded-full bg-blue-100 dark:bg-blue-950 text-blue-700 dark:text-blue-300 flex items-center justify-center font-bold text-xs shrink-0">
                  <Icons.User className="w-4 h-4" />
                </div>
                {isEditingName ? (
                  <div className="flex items-center gap-1">
                    <input
                      type="text"
                      value={inputName}
                      onChange={(e) => setInputName(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && handleSaveName()}
                      autoFocus
                      className="w-20 px-1.5 py-0.5 text-xs border rounded bg-white dark:bg-slate-800 border-blue-500"
                    />
                    <button onClick={handleSaveName} className="text-blue-600 dark:text-blue-400 p-0.5">
                      <Icons.Check className="w-3.5 h-3.5" />
                    </button>
                  </div>
                ) : (
                  <div onClick={() => setIsEditingName(true)} className="flex items-center gap-1 cursor-pointer hover:bg-slate-200/60 dark:hover:bg-slate-800 py-1 px-1.5 rounded-lg flex-1 min-w-0">
                    <span className="font-semibold text-xs text-slate-800 dark:text-slate-200 truncate font-display">{userName}</span>
                    <Icons.Edit2 className="w-3 h-3 text-slate-400 shrink-0" />
                  </div>
                )}
              </div>

              <button onClick={() => setIsConfigOpen(true)} className="p-2 text-slate-500 hover:bg-slate-200/60 dark:hover:bg-slate-800 rounded-full">
                <Icons.Settings className="w-4 h-4" />
              </button>
            </div>

          </aside>

          <div className="flex-1 flex flex-col h-full min-w-0">
            
            <header className="px-4 py-2.5 border-b border-slate-200/50 dark:border-slate-800/60 flex items-center justify-between sticky top-0 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md z-30">
              <div className="flex items-center gap-3">
                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full cursor-pointer">
                  <Icons.PanelLeft className="w-5 h-5 text-slate-600 dark:text-slate-300" />
                </button>
                <div className="flex items-center gap-2 cursor-pointer" onClick={handleNewChat}>
                  <Icons.GeminiLogo className="w-5 h-5" />
                  <span className="font-extrabold text-lg tracking-tight font-display text-slate-900 dark:text-slate-100">Gemini</span>
                </div>
              </div>

              <div className="flex items-center gap-2">
                <button onClick={() => alert("Gemini Advanced プロプランです")} className="px-4 py-1.5 rounded-full bg-[#d3e3fd] hover:bg-[#c2e7ff] text-[#041e49] text-xs font-bold flex items-center gap-1.5 transition-all cursor-pointer shadow-2xs">
                  <Icons.Sparkles className="w-3.5 h-3.5 text-blue-600" />
                  <span>アップグレード</span>
                </button>

                <button onClick={handleNewChat} className="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full cursor-pointer">
                  <Icons.PenSquare className="w-4 h-4" />
                </button>

                <button onClick={() => setThemeMode(themeMode === "light" ? "dark" : "light")} className="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full cursor-pointer">
                  {themeMode === "light" ? <Icons.Moon className="w-4 h-4 text-slate-700" /> : <Icons.Sun className="w-4 h-4 text-amber-400" />}
                </button>
              </div>
            </header>

            <main className="flex-1 overflow-y-auto relative">
              {currentSession.messages.length === 0 ? (
                <div className="max-w-2xl mx-auto px-4 py-12 flex flex-col items-center justify-center min-h-[75vh] text-center space-y-8">
                  
                  <div className="space-y-2">
                    <h1 className="text-2xl sm:text-4xl font-normal text-slate-800 dark:text-slate-100 font-display tracking-tight">
                      <span className="font-semibold bg-gradient-to-r from-blue-600 via-indigo-600 to-sky-500 bg-clip-text text-transparent">
                        {userName}
                      </span>
                      {" さん、今の気分はどうですか？"}
                    </h1>
                  </div>

                  <form onSubmit={handleSendMessage} className="w-full relative rounded-3xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-2.5 shadow-lg space-y-2">
                    
                    {attachments.length > 0 && (
                      <div className="flex items-center gap-2 px-2 pt-1 overflow-x-auto">
                        {attachments.map((att, i) => (
                          <div key={i} className="relative group w-14 h-14 rounded-xl overflow-hidden border border-slate-300 dark:border-slate-700 shrink-0">
                            <img src={att.data} alt={att.name} className="w-full h-full object-cover" />
                            <button
                              type="button"
                              onClick={() => setAttachments(attachments.filter((_, idx) => idx !== i))}
                              className="absolute top-0.5 right-0.5 bg-slate-900/80 text-white rounded-full p-0.5"
                            >
                              <Icons.X className="w-3 h-3" />
                            </button>
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="flex items-center gap-2 px-2">
                      <input
                        type="file"
                        ref={fileInputRef}
                        onChange={handleFileUpload}
                        className="hidden"
                        multiple
                        accept="image/*"
                      />
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="p-2 text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full cursor-pointer"
                        title="画像を添付"
                      >
                        <Icons.Plus className="w-5 h-5" />
                      </button>

                      <input
                        type="text"
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        placeholder="Gemini に相談"
                        className="flex-1 py-2 text-sm bg-transparent focus:outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 font-normal"
                      />
                    </div>

                    <div className="flex items-center justify-between pt-2 border-t border-slate-200/50 dark:border-slate-800/60 px-2">
                      <div className="relative">
                        <button
                          type="button"
                          onClick={() => setIsModelDropdownOpen(!isModelDropdownOpen)}
                          className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-slate-200/80 dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-xs font-semibold cursor-pointer hover:bg-slate-300/80"
                        >
                          <span>{activeModel.name}</span>
                          <Icons.ChevronDown className="w-3.5 h-3.5" />
                        </button>

                        {isModelDropdownOpen && (
                          <div className="absolute bottom-full left-0 mb-2 w-64 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl p-1.5 z-50">
                            {MODELS.map((m) => (
                              <button
                                key={m.id}
                                type="button"
                                onClick={() => {
                                  setActiveModel(m);
                                  setIsModelDropdownOpen(false);
                                }}
                                className={`w-full text-left p-2.5 rounded-xl text-xs flex flex-col gap-0.5 cursor-pointer ${
                                  m.id === activeModel.id ? "bg-blue-50 dark:bg-blue-950/60 font-bold text-blue-700 dark:text-blue-300" : "hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-800 dark:text-slate-200"
                                }`}
                              >
                                <div className="flex items-center justify-between">
                                  <span>{m.name}</span>
                                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-200/60 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-normal">{m.badge}</span>
                                </div>
                                <span className="text-[11px] text-slate-400 font-normal">{m.desc}</span>
                              </button>
                            ))}
                          </div>
                        )}
                      </div>

                      <div className="flex items-center gap-2">
                        <button
                          type="button"
                          onClick={() => setEnableGoogleSearch(!enableGoogleSearch)}
                          className={`p-2 rounded-full cursor-pointer transition-colors ${
                            enableGoogleSearch ? "bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300" : "text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800"
                          }`}
                          title="Google リアルタイム検索"
                        >
                          <Icons.Globe className="w-4 h-4" />
                        </button>

                        <button
                          type="submit"
                          disabled={!inputText.trim() && attachments.length === 0}
                          className={`p-2.5 rounded-full cursor-pointer transition-all ${
                            !inputText.trim() && attachments.length === 0
                              ? "bg-slate-200 text-slate-400 dark:bg-slate-800 dark:text-slate-600"
                              : "bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-900 shadow-md"
                          }`}
                        >
                          <Icons.Send className="w-4 h-4" />
                        </button>
                      </div>
                    </div>

                  </form>
                </div>
              ) : (
                <div className="max-w-3xl mx-auto p-4 sm:p-6 space-y-6 pb-28">
                  {currentSession.messages.map((msg) => (
                    <div key={msg.id} className={`flex gap-3 ${msg.role === "user" ? "justify-end" : "justify-start"}`}>
                      {msg.role === "assistant" && (
                        <div className="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-950/80 flex items-center justify-center shrink-0 shadow-2xs mt-1">
                          <Icons.GeminiLogo className="w-5 h-5" />
                        </div>
                      )}

                      <div className={`space-y-2 max-w-[85%] ${msg.role === "user" ? "items-end" : "items-start"}`}>
                        {msg.attachments && msg.attachments.length > 0 && (
                          <div className="flex flex-wrap gap-2 justify-end">
                            {msg.attachments.map((att, i) => (
                              <img key={i} src={att.data} alt={att.name} className="w-32 h-32 object-cover rounded-2xl border border-slate-200 dark:border-slate-800 shadow-2xs" />
                            ))}
                          </div>
                        )}

                        <div className={`p-4 rounded-3xl text-sm ${
                          msg.role === "user"
                            ? "bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-tr-xs font-medium"
                            : "bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800 text-slate-800 dark:text-slate-200 rounded-tl-xs shadow-2xs"
                        }`}>
                          {msg.role === "assistant" ? (
                            <div
                              className="markdown-body leading-relaxed"
                              dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(msg.text || "") : msg.text }}
                            />
                          ) : (
                            <div className="whitespace-pre-wrap">{msg.text}</div>
                          )}
                        </div>

                        {msg.role === "assistant" && msg.text && (
                          <div className="flex items-center gap-2 text-xs text-slate-400 px-1">
                            <span>{msg.timestamp}</span>
                            <button onClick={() => handleSpeechText(msg.text)} className="hover:text-blue-600 cursor-pointer p-1">
                              <Icons.Volume2 className="w-3.5 h-3.5" />
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}

                  {isLoading && (
                    <div className="flex items-center gap-3 text-slate-400 text-xs italic pl-2">
                      <Icons.GeminiLogo className="w-5 h-5 animate-spin" />
                      <span>Gemini が応答を生成中...</span>
                    </div>
                  )}
                  <div ref={messagesEndRef} />
                </div>
              )}
            </main>

            {currentSession.messages.length > 0 && (
              <div className="p-3 sm:p-4 bg-gradient-to-t from-white via-white/95 to-transparent dark:from-slate-950 dark:via-slate-950/95 sticky bottom-0 left-0 right-0 z-20">
                <form onSubmit={handleSendMessage} className="max-w-3xl mx-auto relative rounded-3xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-2 shadow-lg space-y-2">
                  
                  {attachments.length > 0 && (
                    <div className="flex items-center gap-2 px-2 pt-1 overflow-x-auto">
                      {attachments.map((att, i) => (
                        <div key={i} className="relative group w-12 h-12 rounded-xl overflow-hidden border shrink-0">
                          <img src={att.data} alt={att.name} className="w-full h-full object-cover" />
                          <button type="button" onClick={() => setAttachments(attachments.filter((_, idx) => idx !== i))} className="absolute top-0.5 right-0.5 bg-black/70 text-white rounded-full p-0.5">
                            <Icons.X className="w-2.5 h-2.5" />
                          </button>
                        </div>
                      ))}
                    </div>
                  )}

                  <div className="flex items-center gap-2 px-2">
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" multiple accept="image/*" />
                    <button type="button" onClick={() => fileInputRef.current?.click()} className="p-2 text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full cursor-pointer">
                      <Icons.Plus className="w-4 h-4" />
                    </button>

                    <input
                      type="text"
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      placeholder="Gemini に相談"
                      className="flex-1 py-1.5 text-sm bg-transparent focus:outline-none text-slate-900 dark:text-slate-100"
                    />

                    <button
                      type="submit"
                      disabled={!inputText.trim() && attachments.length === 0}
                      className={`p-2 rounded-full cursor-pointer ${
                        !inputText.trim() && attachments.length === 0
                          ? "bg-slate-200 text-slate-400 dark:bg-slate-800"
                          : "bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-900"
                      }`}
                    >
                      <Icons.Send className="w-4 h-4" />
                    </button>
                  </div>
                </form>
              </div>
            )}

          </div>

          {isConfigOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 max-w-md w-full p-6 space-y-5 shadow-2xl">
                <div className="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-3">
                  <div className="flex items-center gap-2">
                    <Icons.Settings className="w-5 h-5 text-blue-600" />
                    <h2 className="font-bold text-base font-display text-slate-900 dark:text-slate-100">モデル設定</h2>
                  </div>
                  <button onClick={() => setIsConfigOpen(false)} className="p-1 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">
                    <Icons.X className="w-5 h-5" />
                  </button>
                </div>

                <div className="space-y-4 text-xs">
                  <div>
                    <label className="font-semibold text-slate-700 dark:text-slate-300 block mb-1">システムプロンプト (System Instruction)</label>
                    <textarea
                      value={systemInstruction}
                      onChange={(e) => setSystemInstruction(e.target.value)}
                      placeholder="例: あなたは親切で正確なAIアシスタントです。"
                      rows="3"
                      className="w-full p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none text-slate-900 dark:text-slate-100"
                    />
                  </div>

                  <div>
                    <div className="flex justify-between mb-1">
                      <label className="font-semibold text-slate-700 dark:text-slate-300">創造性 (Temperature): {temperature}</label>
                    </div>
                    <input
                      type="range"
                      min="0"
                      max="1"
                      step="0.1"
                      value={temperature}
                      onChange={(e) => setTemperature(parseFloat(e.target.value))}
                      className="w-full accent-blue-600"
                    />
                  </div>
                </div>

                <div className="pt-2 flex justify-end">
                  <button onClick={() => setIsConfigOpen(false)} className="px-5 py-2 rounded-full bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-900 font-bold text-xs cursor-pointer">
                    完了
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
